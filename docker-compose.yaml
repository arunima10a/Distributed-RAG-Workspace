version: '3.8'

services:
  user_service:
    build:
      context: . 
      dockerfile: go_apps/user_service/Dockerfile 
    ports: ["8081:8081"]
    environment:
      DB_DSN: "postgres://admin:secretpassword@postgres:5432/collab_db?sslmode=disable"
    depends_on: [postgres]

  collaboration_service:
    build:
      context: .
      dockerfile: go_apps/collaboration_service/Dockerfile
    ports: ["8082:8082"]
    environment:
      DB_DSN: "postgres://admin:secretpassword@postgres:5432/collab_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    depends_on: [postgres, redis]

  llm_service_go:
    build:
      context: .
      dockerfile: go_apps/llm_service/go_component/Dockerfile
    ports: ["8083:8083"]
    environment:
      DB_DSN: "postgres://admin:secretpassword@postgres:5432/collab_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      PYTHON_GRPC_ADDR: "llm_python:50051"
    depends_on: [postgres, redis, llm_python]

  llm_python:
    build:
      context: .
      dockerfile: services/llm_python/Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
  

  postgres:
    image: ankane/pgvector:latest
    container_name: collab_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: collab_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: collab_redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

  kafka:
    image: apache/kafka:latest # The official Apache image is sometimes lighter than Bitnami
    container_name: collab_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  pgdata:
  redisdata: