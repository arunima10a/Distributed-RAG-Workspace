# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name buildspace.ink www.buildspace.ink;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name buildspace.ink www.buildspace.ink;

    ssl_certificate /etc/letsencrypt/live/buildspace.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buildspace.ink/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA
    location / {
        try_files $uri /index.html;
    }

    # User Service
    location /login {
        proxy_pass http://172.17.0.1:8081;
    }

    location /register {
        proxy_pass http://172.17.0.1:8081;
    }

    location /groups/ {
        proxy_pass http://172.17.0.1:8081;
    }

    # Collaboration WebSocket
    location /ws {
        proxy_pass http://172.17.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # LLM Service
    location /ingest {
        proxy_pass http://172.17.0.1:8083;
    }

    location /ingest-file {
        proxy_pass http://172.17.0.1:8083;
    }
}

